name: Publish Agent to GitHub Packages

on:
  push:
    branches:
      - main
    paths:
      - "packages/ghostdev-agent/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"

      - name: Install and build
        run: |
          cd packages/ghostdev-agent
          npm install
          npm run build

      - name: Publish
        run: cd packages/ghostdev-agent && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
